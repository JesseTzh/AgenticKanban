services:
  agentic-kanban-app:
    build: .
    container_name: agentic-kanban-app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: prod
      HTTP_ADDR: :8080
      SQLITE_PATH: /app/data/agentic-kanban.db
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
      SESSION_TTL: 24h
      AGENT_TOKEN_SECRET: ${AGENT_TOKEN_SECRET:-change-me-agent-token-secret}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    restart: unless-stopped
